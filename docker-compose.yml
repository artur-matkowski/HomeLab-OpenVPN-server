version: "3"

services:
  openvpn-hub:
    image: arturmatkowski/openvpn-server:latest
    container_name: openvpn-hub
    network_mode: "host"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    restart: unless-stopped
    privileged: true
    tty: true
    stdin_open: true
    environment:
      - SERVER_FALLBACK_PRIORITY=0
      - SERVER_ADDRESS=myHetznerFqdn
      - SERVER_LISTENING_PORT=1194
      - VPN_DNS=192.168.74.200
      - OPENVPN_PROTO=udp
      - OPENVPN_COUNTRY=US
      - OPENVPN_PROVINCE=State
      - OPENVPN_CITY=City
      - OPENVPN_ORG=MyVPN
      - OPENVPN_EMAIL=admin@example.com
      - OPENVPN_OU=MyVPN_Unit
      - OPENVPN_NETWORK=192.168.75.0
      - OPENVPN_HOST_NETWORK=192.168.74.0
      # Must EXACTLY match the CN of the cert pfSense connects with.
      # The CCD file at /etc/openvpn/ccd/<this value> carries the iroute that
      # binds the LAN subnet to the pfSense peer. CN mismatch = no LAN reachability.
      - PFSENSE_CLIENT_CN=matkoland
    volumes:
      - /opt/openvpn:/etc/openvpn
