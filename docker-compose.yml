version: "3"

services:
  openvpn-hub:
    # Tag is supplied by the deploy scripts (IMAGE_TAG=dev|latest). Built locally
    # by scripts/build.sh — no registry pull. Defaults to :latest for a bare
    # `docker compose up`.
    image: arturmatkowski/openvpn-server:${IMAGE_TAG:-latest}
    container_name: openvpn-hub
    network_mode: "host"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    restart: unless-stopped
    privileged: true
    tty: true
    stdin_open: true
    # All hub configuration lives in .env (gitignored; see .env.example for the
    # documented reference). Injected into the container, where the in-container
    # scripts read it. Edit .env + redeploy to re-apply.
    env_file:
      - .env
    volumes:
      - /opt/openvpn:/etc/openvpn
